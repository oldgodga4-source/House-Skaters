<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>House Skate</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; }
canvas { display:block; }
</style>
</head>
<body><canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// LANES
const lanes = [
    canvas.width * 0.3,
    canvas.width * 0.5,
    canvas.width * 0.7
];

// PLAYER
let player = {
    lane: 1,
    y: canvas.height - 150,
    width: 50,
    height: 50,
    jumping: false,
    vy: 0
};

// GAME STATE
let obstacles = [];
let coins = [];
let speed = 6;
let gameOver = false;

let score = 0;
let totalCoins = localStorage.getItem("coins") || 0;
let highScore = localStorage.getItem("highscore") || 0;

// INPUT (KEYBOARD)
document.addEventListener("keydown", (e) => {
    if (gameOver && e.key === "r") restart();

    if (gameOver) return;

    if (e.key === "ArrowLeft" && player.lane > 0) player.lane--;
    if (e.key === "ArrowRight" && player.lane < 2) player.lane++;

    if (e.key === "ArrowUp" && !player.jumping) {
        player.jumping = true;
        player.vy = -15;
    }
});

// MOBILE SWIPE
let startX = 0;
let startY = 0;

canvas.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", (e) => {
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30 && player.lane < 2) player.lane++;
        if (dx < -30 && player.lane > 0) player.lane--;
    } else {
        if (dy < -30 && !player.jumping) {
            player.jumping = true;
            player.vy = -15;
        }
    }
});

// SPAWN
function spawnObstacle() {
    obstacles.push({
        lane: Math.floor(Math.random() * 3),
        y: -60,
        size: 50
    });
}

function spawnCoin() {
    coins.push({
        lane: Math.floor(Math.random() * 3),
        y: -60,
        size: 20
    });
}

setInterval(spawnObstacle, 1200);
setInterval(spawnCoin, 700);

// UPDATE
function update() {
    if (gameOver) return;

    speed += 0.001;

    // gravity
    if (player.jumping) {
        player.y += player.vy;
        player.vy += 1;

        if (player.y >= canvas.height - 150) {
            player.y = canvas.height - 150;
            player.jumping = false;
        }
    }

    // obstacles
    obstacles.forEach((o, i) => {
        o.y += speed;

        if (o.y > canvas.height) obstacles.splice(i, 1);

        if (
            Math.abs(lanes[o.lane] - lanes[player.lane]) < 10 &&
            o.y + o.size > player.y &&
            o.y < player.y + player.height
        ) {
            endGame();
        }
    });

    // coins
    coins.forEach((c, i) => {
        c.y += speed;

        if (c.y > canvas.height) coins.splice(i, 1);

        if (
            Math.abs(lanes[c.lane] - lanes[player.lane]) < 10 &&
            c.y > player.y &&
            c.y < player.y + player.height
        ) {
            coins.splice(i, 1);
            score += 10;
            totalCoins = parseInt(totalCoins) + 10;
        }
    });
}

// END GAME
function endGame() {
    gameOver = true;

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highscore", highScore);
    }

    localStorage.setItem("coins", totalCoins);
}

// RESTART
function restart() {
    obstacles = [];
    coins = [];
    speed = 6;
    score = 0;
    gameOver = false;

    player.lane = 1;
    player.y = canvas.height - 150;
}

// DRAW
function drawBackground() {
    // yol
    ctx.fillStyle = "#555";
    ctx.fillRect(canvas.width * 0.2, 0, canvas.width * 0.6, canvas.height);

    // evler
    ctx.fillStyle = "#8B4513";
    for (let i = 0; i < 10; i++) {
        ctx.fillRect(0, i * 150, 80, 100);
        ctx.fillRect(canvas.width - 80, i * 150, 80, 100);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBackground();

    // player
    ctx.fillStyle = "black";
    ctx.fillRect(
        lanes[player.lane] - player.width / 2,
        player.y,
        player.width,
        player.height
    );

    // obstacles
    ctx.fillStyle = "red";
    obstacles.forEach(o => {
        ctx.fillRect(lanes[o.lane] - 25, o.y, 50, 50);
    });

    // coins
    ctx.fillStyle = "yellow";
    coins.forEach(c => {
        ctx.beginPath();
        ctx.arc(lanes[c.lane], c.y, c.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // UI
    ctx.fillStyle = "white";
    ctx.font = "25px Arial";
    ctx.fillText("Score: " + score, 20, 40);
    ctx.fillText("Coins: " + totalCoins, 20, 80);
    ctx.fillText("Best: " + highScore, 20, 120);

    if (gameOver) {
        ctx.fillStyle = "black";
        ctx.font = "50px Arial";
        ctx.fillText("GAME OVER", canvas.width/2 - 150, canvas.height/2);
        ctx.font = "25px Arial";
        ctx.fillText("R bas veya ekrana dokun", canvas.width/2 - 130, canvas.height/2 + 50);
    }
}

// TOUCH RESTART
canvas.addEventListener("touchstart", () => {
    if (gameOver) restart();
});

// LOOP
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script></body>
</html>
